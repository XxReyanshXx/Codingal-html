<html>
    <head>
        <title>Make changes to Rectangle</title>
        <style>
            h2{
                text-align:center;
            }
            .rectangle{
                border:20px solid rgb(17, 208, 218);
                width: 200px;
                height:200px;
                margin:auto;

            }
            .buttons{
                padding:20px;
                width:200px;
                margin:auto;
                text-align:center;
            }
        </style>

    </head>
    <body>
        <h2>Make changes to Rectangle</h2>
        <div class="Rectangle"></div>
        <div class="buttons">
            <button onclick="changeToCircle()">Make circle button</button>
            <button onclick="hideRect()">Hide</button>
            <button onclick="showRect()">Show</button>
        </div>
        <script>
            let div=document.querySelector(".rectangle")
            function changeToCircle() {
                div.style.borderRadius ="50%";
            }
            function hideRect(){
                div.style.display="none";
            }
            function showRect(){
                div.style.display="Block";
            }
            div.onmouseenter = function (){

            div.style.background ="red";    
            }
            div.onmouseleave = function (){
                div.style.background ="transparent";
            }
        </script>

    </body>
</html>
