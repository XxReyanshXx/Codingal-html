<html>
    <head>
        <title>
            odd & even
        </title>
    </head>
    <body>
        <script>
            function oddoreven(number){
                if (number % 2 == 0)
                document.write(number +'The number  is even');
            else
            document.write(number +'The number is odd');
            }
             let number = prompt("Enter the number:");
                oddoreven(number);
        </script>
    </body>
</html>
