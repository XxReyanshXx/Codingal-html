
<html>

<head>
    <title>Multiplication using functions</title>
</head>

<body>
    <script>
        function Multipli() {
            let x = 4;
            let y = 8;
            let z = x * y;
            return z;
        }

        
        var product = Multipli();
        document.write("The product of x and y = " + product); 
    </script>
</body>

</html>
