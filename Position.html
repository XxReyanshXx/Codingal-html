<html>
    <head>
        <style>
            div{
                right:30px;
                border:3px solid #73ad21;
            }
            div.absilute{
                position:absilute;
                left:50px;
                border: 3px solid blue;
            }
            div.relative{
                position:relative;
                left:100px;
                border: 3 px solid #73ad21;
            }
            div.fixed{
                position:fixed;
                top:0;
                right:20px;
                width:300px;
                border: 3 px solid #73ad21;
            }
             div.sticky{
                position:sticky;
                top:1px;
                right:20px;
                width:100px;
                border: 3 px solid #73ad21;
            }
        </style>
    </head>
    <body>
        <h2>positioning</h2>
        <div>
            div with no position property
        </div>
        <div class="sticky">
            div with sticky position property
        </div>
        <div class="relative">
            the div element has position="relative"
            <div class="absolute">
                absilute class div
            </div>
            
        </div>
        <div class="fixed">
            div with fixed position property
        </div>
        <div style="height: 1800px; border:none;"></div>
    </body>
</html>
